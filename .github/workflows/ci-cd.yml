name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔍 Secret scanning
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # 🐳 Set up Docker Buildx (CRITICAL FIX)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔐 Login to GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🐳 Build + Push Docker image (FIXED WAY)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ghcr.io/${{ github.actor }}/user-service:latest

      # 🛡️ Trivy scan
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.actor }}/user-service:latest
          format: table
          exit-code: 0
