name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:

  security-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔍 Secret scanning
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # 🐍 Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🐳 Login to GHCR
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 🐳 Build Docker image (FIXED NAME)
      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.actor }}/user-service:latest ./user-service

      # 🛡️ Trivy scan
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.actor }}/user-service:latest
          format: table
          exit-code: 0

      # 📤 Push image
      - name: Push Docker image
        run: docker push ghcr.io/${{ github.actor }}/user-service:latest
